<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Touch Simulator</title>
  <style>
    :root {
      --bg-color: #0f0f11;
      --text-color: #f1f1f1;
      --primary-color: #00f0ff;
      --error-color: #ff3b30;
      --success-color: #34c759;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }

    #status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 12px;
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--error-color);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status.connected {
      color: var(--success-color);
    }

    #status::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    /* Container maintaining 16:9 ratio */
    #simulator-container {
      width: 95vw;
      height: calc(95vw * (9 / 16));
      max-height: 80vh;
      max-width: calc(80vh * (16 / 9));
      position: relative;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      background-color: #000;
      /* Grid background */
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.15) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
      background-size: 6.25% 11.11%; /* 16 columns by 9 rows */
      overflow: hidden;
      cursor: crosshair;
    }

    /* Target overlay coordinates output */
    #coordinates {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: monospace;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.8);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      pointer-events: none;
      color: var(--primary-color);
    }

    /* Touch tracking visualization on simulator screen itself */
    .touch-indicator {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--primary-color);
      background: rgba(0, 240, 255, 0.2);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: ping 0.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes ping {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.3);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>IR Touch Frame Simulator</h1>
    <div id="status">Connecting...</div>
  </header>

  <div id="simulator-container">
    <!-- Touch/Mouse events will be tracked here -->
  </div>

  <div id="coordinates">X: 0.000, Y: 0.000</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
